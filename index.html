<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALL BOOK - 프리미엄 통합 도서 검색</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =========================================
           1. 색상 및 기본 폰트 설정
        ========================================= */
        :root {
            --primary: #2563eb;       
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;           
            --card-bg: #ffffff;
            --text: #1f2937;
            --sec-text: #6b7280;
            --border: #e5e7eb;
            --tag-bg: #eff6ff;
            --tag-text: #2563eb;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            overflow-x: hidden; 
        }

        /* =========================================
           2. 폴드7 화면 분할 레이아웃
        ========================================= */
        .header {
            text-align: center;
            margin: 20px 0 30px 0;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr; /* 좁은 화면: 위아래 1줄 */
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 700px) {
            /* 폴드7 펼쳤을 때: 왼쪽 50%, 오른쪽 50% 분할 */
            .main-container {
                grid-template-columns: 1fr 1fr; 
                gap: 30px;
                padding: 20px;
            }
            .header { text-align: left; justify-content: flex-start; max-width: 1200px; margin: 20px auto; padding-left: 20px;}
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 17px;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        /* =========================================
           3. 왼쪽 영역: 검색창 & 핵심 도서 정보 (새로 디자인됨!)
        ========================================= */
        .left-panel { display: flex; flex-direction: column; gap: 15px; }

        .search-box {
            display: flex;
            background-color: var(--bg);
            border-radius: 12px;
            padding: 5px 15px;
            align-items: center;
            border: 1px solid var(--border);
        }

        .search-box input {
            flex: 1; border: none; padding: 12px 10px; font-size: 16px; outline: none; background: transparent;
        }

        .search-btn {
            background-color: var(--primary); color: white; border: none; border-radius: 10px; padding: 10px 18px; font-size: 15px; font-weight: bold; cursor: pointer;
        }

        /* 최근 검색어 */
        .recent-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .recent-tag {
            background-color: var(--bg); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--sec-text);
        }

        /* ★ 검색된 책의 메인 정보 카드 (표지 + 줄거리) */
        .main-book-profile {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .main-book-cover {
            width: 110px;
            height: 160px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .main-book-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .main-book-info h2 { margin: 0; font-size: 20px; line-height: 1.3; color: var(--text); word-break: keep-all;}
        .main-book-info .author { margin: 0; font-size: 14px; color: var(--sec-text); }
        .main-book-info .plot {
            margin: 5px 0 0 0;
            font-size: 14px;
            line-height: 1.5;
            color: #4b5563;
            /* 줄거리가 너무 길면 4줄까지만 보이고 말줄임표 처리 */
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 서점 링크 버튼들 (책 정보 바로 밑에 위치) */
        .multi-site-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px dashed var(--border);
            padding-top: 15px;
        }
        
        .site-btn {
            display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 14px 18px; background-color: white; border: 1px solid var(--border); border-radius: 12px; color: var(--text); text-decoration: none; font-weight: 700; font-size: 15px; transition: all 0.2s;
        }
        .site-btn:active { background-color: var(--bg); transform: scale(0.98); }
        .site-btn.kyobo { border-left: 5px solid #5a5a5a; }
        .site-btn.yes24 { border-left: 5px solid #0080ff; }
        .site-btn.aladin { border-left: 5px solid #eb328a; }

        /* =========================================
           4. 오른쪽 영역: AI 분석 (해시태그, 추천 등)
        ========================================= */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }

        .hashtag-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .hashtag { background-color: var(--tag-bg); color: var(--tag-text); padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; }

        .recommend-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .recommend-card { min-width: 100px; text-align: center; cursor: pointer; }
        .recommend-card img { width: 100px; height: 145px; border-radius: 8px; box-shadow: 0 2px 8px var(--shadow); border: 1px solid var(--border); margin-bottom: 6px; }
        .recommend-card p { font-size: 13px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600;}

        .library-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        .library-item { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 14px; display: flex; justify-content: space-between; align-items: center;}
        .status-ok { background-color: #d1fae5; color: #047857; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 12px;}

        .loading-msg { color: var(--sec-text); font-size: 14px; text-align: center; padding: 20px; width: 100%;}
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <i data-lucide="book-open" size="28" color="var(--primary)"></i>
        <h1>ALL BOOK</h1>
    </div>

    <div class="main-container">
        <!-- ==========================================
             왼쪽 패널: 검색창 & 핵심 도서 정보 (메인)
             ========================================== -->
        <div class="left-panel">
            
            <!-- 검색창 영역 -->
            <div class="card" id="searchSection">
                <div class="search-box">
                    <i data-lucide="search" color="var(--sec-text)"></i>
                    <input type="text" id="searchInput" placeholder="궁금한 책 제목을 입력하세요" onkeypress="if(event.key==='Enter') executeSearch()">
                    <button class="search-btn" onclick="executeSearch()">검색</button>
                </div>
                
                <div id="recentSearchArea" style="margin-top: 20px;">
                    <div class="section-title" style="font-size:14px; margin-bottom:10px;"><i data-lucide="clock" size="16"></i> 최근 검색어</div>
                    <div class="recent-tags" id="recent-tags-container"></div>
                </div>
            </div>

            <!-- ★ 책 정보가 가장 먼저 뜨는 영역 (검색 후 나타남) -->
            <div id="mainBookResultCard" class="card hidden">
                <div class="section-title"><i data-lucide="info"></i> 도서 정보</div>
                
                <div class="main-book-profile">
                    <img id="mainBookCover" src="" class="main-book-cover" onerror="this.src='https://via.placeholder.com/110x160?text=No+Image'">
                    <div class="main-book-info">
                        <h2 id="mainBookTitle">책 제목이 여기에 표시됩니다</h2>
                        <p class="author" id="mainBookAuthor">저자명 / 출판사</p>
                        <!-- 책의 줄거리가 여기에 들어갑니다 -->
                        <p class="plot" id="mainBookPlot">도서 줄거리를 불러오는 중입니다...</p>
                    </div>
                </div>

                <!-- 서점 검색 링크들 (도서 정보 바로 아래 배치!) -->
                <div class="multi-site-links">
                    <p style="margin:0 0 5px 0; font-size:13px; color:var(--sec-text); font-weight:bold;">이 책 구매 및 바로 찾기</p>
                    <a href="#" id="linkKyobo" target="_blank" class="site-btn kyobo">
                        교보문고에서 보기 <i data-lucide="shopping-cart" size="18"></i>
                    </a>
                    <a href="#" id="linkYes24" target="_blank" class="site-btn yes24">
                        YES24에서 보기 <i data-lucide="shopping-cart" size="18"></i>
                    </a>
                    <a href="#" id="linkAladin" target="_blank" class="site-btn aladin">
                        알라딘에서 보기 <i data-lucide="shopping-cart" size="18"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- ==========================================
             오른쪽 패널: 정보나루 API 분석 결과 (보조)
             ========================================== -->
        <div class="right-panel">
            
            <!-- 환영 메시지 -->
            <div id="welcomeBox" class="card">
                <div class="section-title"><i data-lucide="bar-chart-2"></i> 나의 독서 취향</div>
                <p id="myStatsText" style="color:var(--sec-text); font-size:15px; line-height:1.6; margin:0;">
                    아직 검색 기록이 없습니다. 책을 검색하시면 취향을 분석해 드립니다!
                </p>
            </div>

            <!-- 1. 핵심 키워드 (해시태그) -->
            <div id="apiHashtagBox" class="card hidden">
                <div class="section-title"><i data-lucide="hash"></i> 독자들이 꼽은 핵심 키워드</div>
                <div id="apiHashtags" class="hashtag-container">
                    <div class="loading-msg">키워드 분석 중...</div>
                </div>
            </div>

            <!-- 2. AI 추천 도서 -->
            <div id="apiRecommendBox" class="card hidden">
                <div class="section-title"><i data-lucide="sparkles"></i> 이 책을 읽은 사람들의 추천 도서</div>
                <div id="recommendScroll" class="recommend-scroll">
                    <div class="loading-msg">추천 도서를 불러오는 중입니다...</div>
                </div>
            </div>

            <!-- 3. 주변 도서관 소장 여부 -->
            <div id="apiLibraryBox" class="card hidden">
                <div class="section-title"><i data-lucide="map-pin"></i> 도서 소장 도서관 (서울 기준)</div>
                <ul id="libraryList" class="library-list">
                    <li class="loading-msg">소장 도서관을 확인하고 있습니다...</li>
                </ul>
            </div>

        </div>
    </div>

    <!-- 스크립트 영역 -->
    <script>
        lucide.createIcons();

        const apiKey = "86bbf34832d0f70658c95d21f790afa9b7ee8956deed3ea4a440a101cafbca69";

        // 검색 실행
        function executeSearch(clickedKeyword = null) {
            const keyword = clickedKeyword || document.getElementById('searchInput').value.trim();
            if (!keyword) { alert("검색어를 입력해주세요."); return; }

            document.getElementById('searchInput').value = keyword;

            // 검색어 저장
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== keyword);
            searches.unshift(keyword);
            if (searches.length > 5) searches.pop();
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            loadRecentSearches();
            analyzeMyTaste(); 

            // 서점 링크 연결
            document.getElementById('linkKyobo').href = `https://search.kyobobook.co.kr/search?keyword=${encodeURIComponent(keyword)}`;
            document.getElementById('linkYes24').href = `https://www.yes24.com/Product/Search?domain=ALL&query=${encodeURIComponent(keyword)}`;
            document.getElementById('linkAladin').href = `https://www.aladin.co.kr/search/wsearchresult.aspx?SearchWord=${encodeURIComponent(keyword)}`;

            // UI 변경 (책 정보 카드 띄우기)
            document.getElementById('recentSearchArea').style.display = 'none'; // 검색 후엔 최근검색어 숨김
            document.getElementById('welcomeBox').classList.add('hidden');
            
            document.getElementById('mainBookResultCard').classList.remove('hidden');
            document.getElementById('apiHashtagBox').classList.remove('hidden');
            document.getElementById('apiRecommendBox').classList.remove('hidden');
            document.getElementById('apiLibraryBox').classList.remove('hidden');

            // 기본 로딩 메시지 설정
            document.getElementById('mainBookTitle').innerText = `'${keyword}' 검색 중...`;
            document.getElementById('mainBookAuthor').innerText = "";
            document.getElementById('mainBookPlot').innerText = "도서 정보를 불러오고 있습니다.";

            // API 호출
            fetchBookApiData(keyword);
        }

        // 도서 통합 검색 API
        async function fetchBookApiData(keyword) {
            try {
                // API 16: 도서 기본정보 (제목, 저자, 표지, 줄거리, ISBN)
                const searchUrl = `https://data4library.kr/api/srchBooks?authKey=${apiKey}&title=${encodeURIComponent(keyword)}&pageNo=1&pageSize=1&format=json`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();
                
                if(!searchData.response.docs || searchData.response.docs.length === 0) {
                    document.getElementById('mainBookTitle').innerText = `'${keyword}'`;
                    document.getElementById('mainBookPlot').innerText = "정보나루 DB에 상세 정보가 등록되지 않은 도서입니다. 아래의 서점 버튼을 눌러 바로 검색해 보세요!";
                    document.getElementById('apiHashtags').innerHTML = "<span class='hashtag'>#데이터없음</span>";
                    document.getElementById('recommendScroll').innerHTML = "<div class='loading-msg'>추천 데이터가 없습니다.</div>";
                    document.getElementById('libraryList').innerHTML = "<li class='library-item'>도서관 정보를 찾을 수 없습니다.</li>";
                    return;
                }

                const book = searchData.response.docs[0].doc;
                const isbn = book.isbn13; 

                // ★ 왼쪽 패널: 핵심 책 정보 렌더링
                document.getElementById('mainBookTitle').innerText = book.bookname;
                document.getElementById('mainBookAuthor').innerText = `${book.authors} / ${book.publisher}`;
                document.getElementById('mainBookCover').src = book.bookImageURL;
                
                // 줄거리가 제공되면 넣고, 없으면 안내문구
                if(book.description && book.description.trim() !== '') {
                    // HTML 태그가 섞여있을 수 있으므로 깔끔하게 처리
                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = book.description;
                    document.getElementById('mainBookPlot').innerText = tempDiv.textContent || tempDiv.innerText || "줄거리 정보가 없습니다.";
                } else {
                    document.getElementById('mainBookPlot').innerText = "이 도서는 줄거리 요약 정보가 제공되지 않습니다.";
                }

                // ★ 오른쪽 패널: 분석 데이터 렌더링
                fetchHashtags(isbn);
                fetchRecommendations(isbn);
                fetchLibraryStatus(isbn);

            } catch(e) {
                console.error(e);
            }
        }

        // 키워드(해시태그) 가져오기
        async function fetchHashtags(isbn) {
            try {
                const url = `https://data4library.kr/api/keywordList?authKey=${apiKey}&isbn13=${isbn}&format=json`;
                const res = await fetch(url);
                const data = await res.json();
                const keywords = data.response.items || [];
                
                let html = '';
                keywords.slice(0, 8).forEach(item => {
                    html += `<span class="hashtag">#${item.item.word}</span>`;
                });
                if(html === '') html = '<span class="hashtag">#등록된_키워드가_없습니다</span>';
                
                document.getElementById('apiHashtags').innerHTML = html;
            } catch(e) {}
        }

        // 추천 도서 가져오기
        async function fetchRecommendations(isbn) {
            const container = document.getElementById('recommendScroll');
            try {
                const url = `https://data4library.kr/api/recommandList?authKey=${apiKey}&isbn13=${isbn}&format=json`;
                const res = await fetch(url);
                const data = await res.json();
                const books = data.response.docs || [];

                if(books.length === 0) {
                    container.innerHTML = '<div class="loading-msg">추천 도서가 없습니다.</div>';
                    return;
                }

                let html = '';
                books.slice(0, 10).forEach(item => {
                    const b = item.book;
                    html += `
                        <div class="recommend-card" onclick="executeSearch('${b.bookname.replace(/'/g, "\\'")}')">
                            <img src="${b.bookImageURL}" onerror="this.src='https://via.placeholder.com/100x145?text=Image'">
                            <p>${b.bookname}</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch(e) {
                container.innerHTML = '<div class="loading-msg">추천 데이터를 불러오지 못했습니다.</div>';
            }
        }

        // 도서관 소장 여부 (서울 11 지역 기준)
        async function fetchLibraryStatus(isbn) {
            const container = document.getElementById('libraryList');
            try {
                const url = `https://data4library.kr/api/libSrchByBook?authKey=${apiKey}&isbn=${isbn}&region=11&format=json`;
                const res = await fetch(url);
                const data = await res.json();
                const libs = data.response.libs || [];

                if(libs.length === 0) {
                    container.innerHTML = '<li class="library-item">서울 지역에 소장한 도서관이 없습니다.</li>';
                    return;
                }

                let html = '';
                libs.slice(0, 7).forEach(item => {
                    html += `
                        <li class="library-item">
                            <span>${item.lib.libName}</span>
                            <span class="status-ok">소장중</span>
                        </li>
                    `;
                });
                container.innerHTML = html;
            } catch(e) {
                container.innerHTML = '<li class="library-item">도서관 정보를 불러오지 못했습니다.</li>';
            }
        }

        // 최근 검색어 관련
        function loadRecentSearches() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            const container = document.getElementById('recent-tags-container');
            container.innerHTML = '';
            
            searches.forEach(keyword => {
                const tag = document.createElement('div');
                tag.className = 'recent-tag';
                tag.innerHTML = `${keyword} <i data-lucide="x" size="12" style="margin-left:4px;" onclick="event.stopPropagation(); deleteSearch('${keyword}')"></i>`;
                tag.onclick = () => executeSearch(keyword);
                container.appendChild(tag);
            });
            lucide.createIcons();
        }

        function deleteSearch(keyword) {
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== keyword);
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            loadRecentSearches();
        }

        function analyzeMyTaste() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            const msgBox = document.getElementById('myStatsText');
            if(searches.length > 0) {
                msgBox.innerHTML = `선생님께서 최근 가장 관심있게 찾아보신 책은 <b>'${searches[0]}'</b> 입니다.<br>검색어를 입력하시면 책의 줄거리와 서점 바로가기, 도서관 대출 여부를 한눈에 보여드립니다.`;
            }
        }

        window.onload = function() {
            loadRecentSearches();
            analyzeMyTaste();
        }
    </script>
</body>
</html>
