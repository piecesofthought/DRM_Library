<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 및 폴드 기기에서 화면 배율을 맞추기 위한 필수 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALL BOOK - 통합 도서 검색</title>
    
    <link rel="icon" type="image/svg+xml" href="AllBook_logo.svg">
    <link rel="apple-touch-icon" href="AllBook_logo.svg">
    <link rel="manifest" href='data:application/manifest+json,{"short_name":"ALL BOOK","name":"ALL BOOK","display":"standalone"}'>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =========================================
           1. 색상 테마 및 기본 설정 (기존 유지)
        ========================================= */
        :root {
            --primary: #007aff;
            --primary-hover: #005bb5;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --sec-text: #86868b;
            --border: #e5e5ea;
            --tag-bg: #e5e5ea;
            --wish-bg: #fffdf0;
            --wish-border: #ffcc00;
            --shadow: rgba(0,0,0,0.05);
        }

        /* 가로 스크롤 방지를 위한 마법의 코드 (매우 중요!) */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            /* 모바일에서 화면 양옆에 여백을 주어 꽉 차지 않게 함 */
            padding: 20px;
            overflow-x: hidden; /* 가로 스크롤 원천 차단 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================================
           2. 검색 영역 UI
        ========================================= */
        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 50px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .search-container {
            width: 100%;
            max-width: 600px; /* 폴드7 펼쳤을 때 너무 길어지지 않게 제한 */
            position: relative;
        }

        .search-box {
            display: flex;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 4px 15px var(--shadow);
            border: 1px solid var(--border);
            align-items: center;
            width: 100%;
        }

        /* 기존 300px 고정이었던 부분을 100%로 변경하여 폴드7 접은 화면 대응 */
        .search-box input {
            flex: 1;
            width: 100%;
            border: none;
            padding: 12px 15px;
            font-size: 16px;
            outline: none;
            background: transparent;
        }

        .search-btn, .wish-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 8px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:active {
            background-color: var(--primary-hover);
            transform: scale(0.98);
        }

        /* =========================================
           3. 최근 검색어 UI
        ========================================= */
        .recent-searches {
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            display: none;
        }

        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--sec-text);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--sec-text);
            font-size: 13px;
            cursor: pointer;
        }

        .recent-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .recent-tag {
            background-color: var(--tag-bg);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .recent-tag span {
            color: var(--text);
        }

        .recent-tag-close {
            color: var(--sec-text);
            cursor: pointer;
        }

        /* =========================================
           4. API 연동: 인기 대출 도서 UI (새로 추가됨)
        ========================================= */
        .popular-books-container {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px var(--shadow);
            border: 1px solid var(--border);
        }

        .popular-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .book-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .book-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-radius: 12px;
            background-color: var(--bg);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .book-item:active {
            transform: scale(0.98);
        }

        .book-rank {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
            width: 20px;
            text-align: center;
        }

        .book-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            /* 글자가 길면 말줄임표(...) 처리 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px; 
        }

        .book-author {
            font-size: 13px;
            color: var(--sec-text);
        }

        .loading-text {
            text-align: center;
            color: var(--sec-text);
            font-size: 14px;
            padding: 20px 0;
        }

        /* =========================================
           5. 반응형 (폴드7 펼쳤을 때 등 넓은 화면)
        ========================================= */
        @media (min-width: 600px) {
            body { padding: 40px; }
            .book-title { max-width: 400px; } /* 넓은 화면에선 제목을 더 길게 보여줌 */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ALL BOOK</h1>
    </div>

    <!-- 검색 영역 -->
    <div class="search-container">
        <div class="search-box">
            <i data-lucide="search" color="var(--sec-text)" style="margin-left: 10px;"></i>
            <input type="text" id="searchInput" placeholder="검색할 도서명을 입력하세요" onkeypress="handleKeyPress(event)" onclick="showRecentSearches()">
            <button class="search-btn" onclick="generateLinks(document.getElementById('searchInput').value)">
                검색
            </button>
        </div>

        <!-- 최근 검색어 영역 -->
        <div class="recent-searches" id="recent-dropdown">
            <div class="recent-header">
                <span>최근 검색어</span>
                <button class="clear-btn" onclick="clearRecentSearches(event)">전체 삭제</button>
            </div>
            <div class="recent-tags" id="recent-tags-container">
                <!-- 자바스크립트로 최근 검색어가 들어가는 곳 -->
            </div>
        </div>
    </div>

    <!-- API 연동: 전국 인기 대출 도서 영역 (새로 추가) -->
    <div class="popular-books-container">
        <div class="popular-header">
            <i data-lucide="trending-up" color="var(--primary)"></i>
            전국 도서관 인기 대출 도서 TOP 5
        </div>
        <div id="popularBooksList">
            <div class="loading-text">데이터를 불러오는 중입니다...</div>
        </div>
    </div>

    <!-- 기존에 작성하신 자바스크립트 영역 (절대 건드리지 않음) -->
    <script>
        // 검색어 입력 시 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                generateLinks(document.getElementById('searchInput').value);
            }
        }

        // 검색 링크 생성 및 로컬스토리지 저장
        function generateLinks(keyword) {
            if (!keyword || keyword.trim() === '') {
                alert("검색어를 입력해주세요.");
                return;
            }
            
            // 최근 검색어 저장 로직
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== keyword); // 중복 제거
            searches.unshift(keyword); // 맨 앞에 추가
            if (searches.length > 5) searches.pop(); // 5개까지만 저장
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            
            // 검색어 입력창 업데이트 및 검색 기록 숨기기
            document.getElementById('searchInput').value = keyword;
            document.getElementById('recent-dropdown').style.display = 'none';
            loadRecentSearches(); // 리스트 갱신

            // ==========================================
            // [주의] 여기에 원래 검색 사이트들을 띄우는 코드가 
            // 있어야 합니다. (window.open 등)
            // 임시로 알림창만 띄워두었습니다. 기존 코드로 채워주세요!
            // ==========================================
            alert("'" + keyword + "' 검색을 실행합니다. (기존 연결 코드 작성 필요)");
        }

        // 최근 검색어 보여주기
        function showRecentSearches() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            if (searches.length > 0) {
                document.getElementById('recent-dropdown').style.display = 'block';
            }
        }

        // 최근 검색어 개별 삭제
        function deleteRecentSearch(keyword, event) {
            event.stopPropagation();
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== keyword);
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            loadRecentSearches();
            
            if(searches.length === 0) {
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        }

        // 최근 검색어 전체 삭제
        function clearRecentSearches(event) {
            event.stopPropagation(); 
            if(confirm("검색 기록을 모두 삭제하시겠습니까?")) {
                localStorage.removeItem('recentBooks'); 
                loadRecentSearches(); 
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        }

        // 최근 검색어 로드 및 태그 생성
        function loadRecentSearches() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            const container = document.getElementById('recent-tags-container');
            container.innerHTML = '';
            
            searches.forEach(keyword => {
                const tag = document.createElement('div');
                tag.className = 'recent-tag';
                tag.innerHTML = `
                    <span onclick="generateLinks('${keyword}')">${keyword}</span>
                    <i data-lucide="x" size="16" class="recent-tag-close" onclick="deleteRecentSearch('${keyword}', event)"></i>
                `;
                container.appendChild(tag);
            });
            lucide.createIcons();
        }

        // 바탕화면 클릭시 최근 검색어 창 닫기
        document.addEventListener('click', function(event) {
            const searchBox = document.querySelector('.search-container');
            if (!searchBox.contains(event.target)) {
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        });

        // 페이지 로드 시 초기화
        window.onload = function() {
            loadRecentSearches();
            fetchPopularBooks(); // 새로 추가한 API 호출 함수 실행
        }
    </script>

    <!-- 새로 추가된 API 연동 자바스크립트 영역 -->
    <script>
        // 발급받으신 정보나루 API 키
        const apiKey = "86bbf34832d0f70658c95d21f790afa9b7ee8956deed3ea4a440a101cafbca69";

        // 정보나루 Open API '인기대출도서' 불러오기
        async function fetchPopularBooks() {
            // API 매뉴얼에 명시된 URL (JSON 형태로 응답받기 위해 format=json 추가)
            const url = `https://data4library.kr/api/loanItemSrch?authKey=${apiKey}&format=json`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // 도서 데이터 추출 (상위 5개만 가져오기)
                const books = data.response.docs.slice(0, 5);
                const container = document.getElementById('popularBooksList');
                
                if(books.length === 0) {
                    container.innerHTML = '<div class="loading-text">현재 인기 도서 데이터를 불러올 수 없습니다.</div>';
                    return;
                }

                // HTML 생성
                let html = '<ul class="book-list">';
                books.forEach((item, index) => {
                    const book = item.doc;
                    html += `
                        <li class="book-item" onclick="generateLinks('${book.bookname.replace(/'/g, "\\'")}')">
                            <span class="book-rank">${index + 1}</span>
                            <div class="book-info">
                                <span class="book-title">${book.bookname}</span>
                                <span class="book-author">${book.authors} / ${book.publisher}</span>
                            </div>
                        </li>
                    `;
                });
                html += '</ul>';
                
                container.innerHTML = html;

            } catch (error) {
                console.error("API 호출 에러:", error);
                document.getElementById('popularBooksList').innerHTML = '<div class="loading-text">도서관 정보나루 서버 점검 중이거나 오류가 발생했습니다.</div>';
            }
        }
    </script>
</body>
</html>
