<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALL BOOK - 통합 도서 검색</title>
    
    <link rel="icon" type="image/svg+xml" href="AllBook_logo.svg">
    <link rel="apple-touch-icon" href="AllBook_logo.svg">
    <link rel="manifest" href='data:application/manifest+json,{"short_name":"ALL BOOK","name":"ALL BOOK","display":"standalone"}'>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #007aff;
            --primary-hover: #005bb5;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --sec-text: #86868b;
            --border: #e5e5ea;
            --tag-bg: #e5e5ea;
            --shadow: rgba(0,0,0,0.08);
            --header-bg: rgba(255, 255, 255, 0.9);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden; 
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            color: var(--text);
        }

        header {
            position: sticky;
            top: 0;
            background-color: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            box-shadow: 0 1px 3px var(--shadow);
            z-index: 100;
            text-align: center;
        }

        h1 {
            margin: 0 0 16px 0;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .search-container {
            display: flex;
            gap: 8px;
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #recent-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--shadow);
            margin-top: 8px;
            padding: 16px;
            display: none;
            z-index: 10;
            text-align: left;
        }

        .recent-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--sec-text);
        }

        #recent-tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .recent-tag {
            background-color: var(--tag-bg);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .recent-tag span { cursor: pointer; }
        .recent-tag-close { cursor: pointer; color: var(--sec-text); }

        main {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin: 24px 0 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bookshelf-scroll {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding-bottom: 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .bookshelf-scroll::-webkit-scrollbar { display: none; }
        .bookshelf-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .book-card {
            flex: 0 0 auto;
            width: 140px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .book-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            background-color: var(--border);
            border: 1px solid var(--border);
        }

        .book-title {
            font-size: 14px;
            font-weight: bold;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-author {
            font-size: 12px;
            color: var(--sec-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-text {
            color: var(--sec-text);
            font-size: 14px;
            text-align: center;
            width: 100%;
            padding: 20px 0;
        }

        /* 외부 링크 버튼 디자인 */
        .link-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .library-btn {
            display: inline-flex;
            align-items: center;
            padding: 14px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 2px 5px var(--shadow);
            transition: all 0.2s;
        }

        .library-btn:active {
            background-color: var(--tag-bg);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header>
        <h1>ALL BOOK</h1>
        <div class="search-container">
            <input type="text" id="keyword" class="search-input" placeholder="읽고 싶은 책을 검색해보세요" onclick="showRecentDropdown()">
            <button class="search-btn" onclick="executeSearch()">
                <i data-lucide="search" size="20"></i>
            </button>
            
            <div id="recent-dropdown">
                <div class="recent-header">
                    <span>최근 검색어</span>
                    <span style="color: var(--primary); cursor: pointer;" onclick="clearRecentSearches(event)">전체 삭제</span>
                </div>
                <div id="recent-tags-container"></div>
            </div>
        </div>
    </header>

    <main>
        <!-- 검색 결과 버튼 영역 -->
        <div id="search-result-area">
            <!-- 검색을 실행하면 여기에 강남구 등 링크 버튼이 생깁니다 -->
        </div>

        <!-- 도서관 정보나루 API 영역 -->
        <h2 class="section-title" style="margin-top: 30px;">
            <i data-lucide="trending-up" color="var(--primary)"></i> 
            전국 도서관 인기 대출 도서
        </h2>
        
        <div id="api-books-container" class="bookshelf-scroll">
            <div class="loading-text">인기 도서를 불러오는 중입니다...</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadRecentSearches();
            lucide.createIcons();
            
            document.getElementById('keyword').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    executeSearch();
                }
            });
        });

        document.addEventListener('click', function(event) {
            const searchContainer = document.querySelector('.search-container');
            if (!searchContainer.contains(event.target)) {
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        });

        function showRecentDropdown() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            if(searches.length > 0) {
                document.getElementById('recent-dropdown').style.display = 'block';
            }
        }

        function executeSearch() {
            const keyword = document.getElementById('keyword').value.trim();
            if(keyword === "") {
                alert("검색어를 입력해주세요.");
                return;
            }
            saveKeyword(keyword);
            document.getElementById('recent-dropdown').style.display = 'none';
            
            // 기존에 잘 만들어두신 링크 생성 함수 호출!
            generateLinks(keyword); 
        }

        function saveKeyword(keyword) {
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== keyword);
            searches.unshift(keyword);
            if(searches.length > 10) searches.pop();
            
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            loadRecentSearches();
        }

        function deleteRecentSearch(keyword, event) {
            event.stopPropagation();
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== keyword);
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            loadRecentSearches();
            
            if(searches.length === 0) {
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        }

        function clearRecentSearches(event) {
            event.stopPropagation(); 
            if(confirm("검색 기록을 모두 삭제하시겠습니까?")) {
                localStorage.removeItem('recentBooks'); 
                loadRecentSearches(); 
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        }

        function loadRecentSearches() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            const container = document.getElementById('recent-tags-container');
            container.innerHTML = '';
            
            searches.forEach(keyword => {
                const tag = document.createElement('div');
                tag.className = 'recent-tag';
                tag.innerHTML = `
                    <span onclick="document.getElementById('keyword').value='${keyword}'; executeSearch();">${keyword}</span>
                    <i data-lucide="x" size="14" class="recent-tag-close" onclick="deleteRecentSearch('${keyword}', event)"></i>
                `;
                container.appendChild(tag);
            });
            lucide.createIcons();
        }

        /*========================================================================
          ★ 사용자님이 작성하셨던 링크 코드를 완벽하게 복원 및 디자인 적용한 부분 ★
        ========================================================================*/
        function generateLinks(query) {
            // 회원님이 올려주신 강남구 코드 (euc-kr 인코딩 문제 우회 로직 포함)
            const unjoinedLinks = [
                { 
                    name: '강남구 전자도서관', 
                    url: `javascript:(function(){var f=document.createElement('form');f.action='https://ebook.gangnam.go.kr/mobile/mbook/bk_result.asp';f.method='get';f.target='_blank';f.acceptCharset='euc-kr';f.innerHTML='<input type="hidden" name="search" value="title"><input type="hidden" name="strSearch" value="${query}">';document.body.appendChild(f);f.submit();document.body.removeChild(f);})()` 
                }
                // 여기에 서초구, 송파구 등 다른 도서관이 있었다면 이 아래로 추가하시면 됩니다!
                // { name: '다른도서관', url: '...' }
            ];

            // 그 외 일반적인 도서관이나 서점 (예시로 알라딘/교보문고 남겨둠)
            const standardLinks = [
                { name: '교보문고 검색', url: `https://search.kyobobook.co.kr/search?keyword=${encodeURIComponent(query)}` },
                { name: '알라딘 검색', url: `https://www.aladin.co.kr/search/wsearchresult.aspx?SearchWord=${encodeURIComponent(query)}` }
            ];

            const resultArea = document.getElementById('search-result-area');
            
            // 화면에 보여줄 버튼들을 HTML로 만들기
            let html = `
                <h2 class="section-title">
                    <i data-lucide="book-open" color="var(--primary)"></i> 
                    '${query}' 검색 결과 보기
                </h2>
                <div class="link-grid">
            `;

            // 1. 강남구 같은 특수 링크들 버튼 생성
            unjoinedLinks.forEach(link => {
                html += `<a href="${link.url}" class="library-btn">${link.name}</a>`;
            });

            // 2. 일반 링크들 버튼 생성 (새 창에서 열리도록 target="_blank" 추가)
            standardLinks.forEach(link => {
                html += `<a href="${link.url}" target="_blank" class="library-btn">${link.name}</a>`;
            });

            html += `</div>`;
            
            // 화면에 렌더링
            resultArea.innerHTML = html;
            
            // 새로 생성된 아이콘 렌더링
            lucide.createIcons();
        }

        // --- 도서관 정보나루 API ---
        document.addEventListener('DOMContentLoaded', fetchPopularBooks);

        async function fetchPopularBooks() {
            const container = document.getElementById('api-books-container');
            const apiKey = "86bbf34832d0f70658c95d21f790afa9b7ee8956deed3ea4a440a101cafbca69";
            const apiUrl = `https://data4library.kr/api/loanItemSrch?authKey=${apiKey}&format=json`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                container.innerHTML = ''; 
                const books = data.response.docs.slice(0, 10);
                
                books.forEach(item => {
                    const book = item.doc;
                    const imageUrl = book.bookImageURL || 'https://via.placeholder.com/150x200?text=No+Image';

                    const bookCard = document.createElement('div');
                    bookCard.className = 'book-card';
                    bookCard.onclick = () => {
                        document.getElementById('keyword').value = book.bookname;
                        executeSearch(); // 책 클릭시 바로 위에서 만든 검색 버튼들이 나타남
                    };
                    bookCard.style.cursor = 'pointer';

                    bookCard.innerHTML = `
                        <img src="${imageUrl}" alt="표지" class="book-cover" onerror="this.src='https://via.placeholder.com/150x200?text=No+Image'">
                        <div class="book-title" title="${book.bookname}">${book.bookname}</div>
                        <div class="book-author">${book.authors}</div>
                    `;
                    
                    container.appendChild(bookCard);
                });

            } catch (error) {
                console.error("API 에러:", error);
                container.innerHTML = `<div class="loading-text">인기 도서를 불러오는데 실패했습니다.</div>`;
            }
        }
    </script>
</body>
</html>
