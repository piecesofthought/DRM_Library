<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 도서 검색</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href='data:application/manifest+json,{"short_name":"도서 찾기","name":"도서 찾기","display":"standalone"}'>
    
    <!-- Lucide Icons (예쁜 아이콘을 불러오는 기능) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 색상 테마 정의 */
        :root {
            --primary: #007aff;
            --primary-hover: #005bb5;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --sec-text: #86868b;
            --border: #d2d2d7;
            --tag-bg: #e8e8ed;
            --wish-bg: #fffdf0;
            --wish-border: #ffcc00;
            --shadow: rgba(0,0,0,0.08);
        }

        /* 다크모드 대응 */
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #0a84ff;
                --primary-hover: #409cff;
                --bg: #000000;
                --card-bg: #1c1c1e;
                --text: #f5f5f7;
                --sec-text: #8e8e93;
                --border: #3a3a3c;
                --tag-bg: #2c2c2e;
                --wish-bg: #2c2500;
                --wish-border: #ffd60a;
                --shadow: rgba(0,0,0,0.3);
            }
        }

        /* 기본 설정 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; padding-bottom: 80px; /* 플로팅 버튼을 위해 아래 여백 추가 */
            background-color: var(--bg); color: var(--text); 
            line-height: 1.5; transition: background-color 0.3s;
        }
        
        .container { width: 100%; max-width: 900px; margin: 0 auto; position: relative; }

        h1 { 
            font-size: 26px; font-weight: 800; text-align: center; margin: 10px 0 30px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: var(--primary);
        }

        /* ---------------- 검색 섹션 ---------------- */
        .search-area { margin-bottom: 30px; position: relative; z-index: 10; }
        
        /* 우상단 즐겨찾기 추가 버튼 */
        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .add-wish-btn { 
            background: none; border: none; color: var(--primary); font-size: 14px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 8px; border-radius: 8px; transition: background 0.2s;
        }
        .add-wish-btn:hover { background: var(--tag-bg); }

        .search-box { 
            display: flex; gap: 8px; background: var(--card-bg); padding: 6px; 
            border-radius: 18px; border: 2px solid var(--border);
            box-shadow: 0 4px 15px var(--shadow);
            position: relative; transition: border-color 0.3s;
        }
        .search-box:focus-within { border-color: var(--primary); }

        #search-input { 
            flex: 1; border: none; background: transparent; padding: 12px 16px; 
            font-size: 16px; color: var(--text); outline: none; width: 100%;
        }
        #search-button { 
            background: var(--primary); border: none; color: white; padding: 0 20px; 
            border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 16px;
            transition: background 0.2s, transform 0.1s;
        }
        #search-button:active { transform: scale(0.95); }

        /* 구글 스타일 최근 검색어 드롭다운 */
        .recent-dropdown {
            display: none; /* 기본은 숨김 */
            position: absolute;
            top: 110%; left: 0; right: 0;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            z-index: 100;
        }
        .recent-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            font-size: 12px; color: var(--sec-text); font-weight: 600;
        }
        .clear-all-btn { background: none; border: none; color: var(--sec-text); font-size: 12px; cursor: pointer; text-decoration: underline; }
        
        .recent-list { list-style: none; margin: 0; padding: 0; }
        .recent-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid var(--tag-bg);
            cursor: pointer; transition: background 0.2s;
        }
        .recent-item:last-child { border-bottom: none; }
        .recent-item:hover { background: var(--tag-bg); }
        .recent-text { flex: 1; display: flex; align-items: center; gap: 10px; font-size: 15px; }
        .recent-delete { 
            background: none; border: none; color: var(--sec-text); 
            padding: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .recent-delete:hover { background: var(--border); color: #ff3b30; }

        /* ---------------- 플로팅 즐겨찾기 ---------------- */
        .floating-wish-btn {
            position: fixed;
            left: 20px;
            bottom: 20px;
            width: 56px; height: 56px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            border: none; cursor: pointer; z-index: 1000;
            transition: transform 0.2s;
        }
        .floating-wish-btn:active { transform: scale(0.9); }

        .wishlist-panel {
            position: fixed;
            left: 20px;
            bottom: 85px;
            width: 280px;
            max-height: 50vh;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            padding: 16px;
            z-index: 999;
            overflow-y: auto;
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .wishlist-panel.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .wishlist-header { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag.wish-tag { 
            background: var(--wish-bg); border: 1px solid var(--wish-border); padding: 8px 14px; 
            border-radius: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            color: #5c4d00; font-weight: 500; width: fit-content;
        }
        @media (prefers-color-scheme: dark) { .tag.wish-tag { color: #ffd60a; } }
        .remove-btn { color: #ff3b30; font-size: 18px; line-height: 1; margin-left: 4px; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; justify-content: center; align-items: center; }

        /* ---------------- 결과 그리드 (폴드 대응) ---------------- */
        .category-group { 
            margin-bottom: 25px; background: var(--card-bg); padding: 20px; 
            border-radius: 20px; box-shadow: 0 2px 10px var(--shadow);
        }
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .cat-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text); }
        .cat-link { font-size: 13px; color: var(--primary); text-decoration: none; cursor: pointer; font-weight: 600; background: var(--tag-bg); padding: 4px 10px; border-radius: 12px; }

        /* 폴드 화면(접었을때 좁음, 펼쳤을때 넓음)에 맞춰 자동으로 열 개수가 변하는 마법의 코드 */
        .links-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 12px; 
        }

        .links-grid a { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 8px;
            background: var(--bg); padding: 16px 10px; text-decoration: none; 
            color: var(--text); font-weight: 600; font-size: 14px; border-radius: 16px; 
            border: 1px solid var(--border); transition: transform 0.1s, background 0.2s, border-color 0.2s;
            word-break: keep-all; /* 단어 단위로 줄바꿈 */
        }
        .links-grid a i { color: var(--primary); opacity: 0.8; }
        .links-grid a:hover { border-color: var(--primary); background: var(--card-bg); }
        .links-grid a:active { transform: scale(0.95); }

        .toggle-btn { 
            width: 100%; margin-top: 15px; background: var(--tag-bg); border: none; 
            color: var(--text); padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-btn:hover { background: var(--border); }

        .empty-state { text-align: center; padding: 60px 0; color: var(--sec-text); font-size: 16px; }
        .empty-state i { display: block; margin: 0 auto 15px; color: var(--border); }

    </style>
</head>
<body>

    <!-- 왼쪽 아래 떠있는 즐겨찾기 버튼 -->
    <button class="floating-wish-btn" onclick="toggleWishlist()">
        <i data-lucide="star" fill="currentColor"></i>
    </button>

    <!-- 플로팅 즐겨찾기 패널 -->
    <div id="wishlist-panel" class="wishlist-panel">
        <div class="wishlist-header"><i data-lucide="bookmark" size="18"></i> 내 책갈피 (즐겨찾기)</div>
        <div id="wishlist" class="tag-container">
            <!-- 즐겨찾기 항목이 여기에 추가됩니다 -->
        </div>
    </div>

    <div class="container">
        <h1><i data-lucide="library" size="32"></i> 통합 도서 검색</h1>
        
        <div class="search-area">
            <!-- 우상단 즐겨찾기 추가 버튼 -->
            <div class="header-actions">
                <button class="add-wish-btn" onclick="addToWishlist()">
                    <i data-lucide="star" size="16"></i> 검색어 즐겨찾기 추가
                </button>
            </div>

            <!-- 검색 박스 -->
            <div class="search-box" id="search-container">
                <i data-lucide="search" size="20" style="margin: 12px 0 0 12px; color: var(--sec-text);"></i>
                <input type="text" id="search-input" placeholder="찾고 싶은 책 제목을 입력하세요" 
                       onkeydown="if(event.key === 'Enter') generateLinks();"
                       onfocus="showDropdown()" onclick="showDropdown()">
                <button id="search-button" onclick="generateLinks()">검색</button>
                
                <!-- 구글 스타일 최근 검색어 드롭다운 -->
                <div id="recent-dropdown" class="recent-dropdown">
                    <div class="recent-header">
                        <span>최근 검색어</span>
                        <button class="clear-all-btn" onclick="clearRecentSearches(event)">전체 삭제</button>
                    </div>
                    <ul id="recent-list" class="recent-list">
                        <!-- 최근 검색어 항목이 여기에 추가됩니다 -->
                    </ul>
                </div>
            </div>
        </div>
        
        <!-- 오른쪽/메인 패널 (검색 결과) -->
        <div id="results">
            <div class="empty-state">
                <i data-lucide="book-open" size="48"></i>
                검색어를 입력하면 다양한 도서관과 서점 링크가 나타납니다.<br>
                (갤럭시 폴드에서도 보기 편하게 최적화되었습니다)
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadRecentSearches();
            loadWishlist();
            lucide.createIcons();

            // 검색창 밖을 클릭하면 최근 검색어 드롭다운 닫기
            document.addEventListener('click', (e) => {
                const searchContainer = document.getElementById('search-container');
                if (!searchContainer.contains(e.target)) {
                    document.getElementById('recent-dropdown').style.display = 'none';
                }
            });
        });

        // 즐겨찾기 패널 열기/닫기
        function toggleWishlist() {
            const panel = document.getElementById('wishlist-panel');
            panel.classList.toggle('show');
            
            // 만약 비어있다면 안내문구 띄우기
            let wishs = JSON.parse(localStorage.getItem('bookWishlist')) || [];
            if(wishs.length === 0 && panel.classList.contains('show')) {
                // 살짝 지연시켜서 보여줌
                setTimeout(() => alert("우측 상단의 '즐겨찾기 추가' 버튼을 눌러 자주 찾는 책이나 키워드를 저장해보세요!"), 100);
            }
        }

        // 최근 검색어 드롭다운 보여주기
        function showDropdown() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            if (searches.length > 0) {
                document.getElementById('recent-dropdown').style.display = 'block';
            }
        }

        function generateLinks(keyword = null) {
            const inputElement = document.getElementById('search-input');
            const query = keyword || inputElement.value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) { return; }

            inputElement.blur(); // 키보드 내리기
            inputElement.value = query;
            saveRecentSearch(query);
            document.getElementById('recent-dropdown').style.display = 'none'; // 드롭다운 닫기

            const encodedQuery = encodeURIComponent(query);
            
            // 🔥 원본 데이터 및 구형 자바스크립트 완벽 보존
            const categories = [
                {
                    id: 'ebook_main',
                    title: 'E-Book (전자책)',

                        { name: '밀리의 서재', url: `https://www.millie.co.kr/v3/search/result/${encodedQuery}`, icon: 'book-text' },

                        { name: '서울 전자도서관', url: `https://elib.seoul.go.kr/contents/search/content?t=EB&k=${encodedQuery}`, icon: 'building' },
                        { name: '서울교육청 전자도서관', url: `https://e-lib.sen.go.kr/contents/search?type=&searchOpt=0&searchKeyword=${encodedQuery}`, icon: 'school' }
                    ]
                },
                // 새로 추가된 무료 아카이브 영역
                {
                    id: 'classic',
                    title: '무료 아카이브 (고전/원문)',
                    icon: 'archive',
                    links: [
                        { name: '인터넷 아카이브', url: `https://archive.org/search?query=${encodedQuery}&and%5B%5D=mediatype%3A%22texts%22`, icon: 'globe' },
                        { name: 'Jikji (직지)', url: `http://jikji.duckdns.org/search/stored/?query=${encodedQuery}`, icon: 'scroll-text' },
                        { name: '구텐베르크 (영문)', url: `https://www.gutenberg.org/ebooks/search/?query=${encodedQuery}`, icon: 'book-open-check' }

                },
                {

                    links: [

                        { name: '용산구', url: `https://ebook.yslibrary.or.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt=${encodedQuery}` },
                        { name: '광진구', url: `https://ebook.gwangjinlib.seoul.kr:446/elibrary-front/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },
                        { name: '관악구', url: `javascript:(function(){var f=document.createElement('form');f.action='https://e-lib.gwanak.go.kr/search/';f.method='get';f.target='_blank';f.acceptCharset='euc-kr';f.innerHTML='<input type="hidden" name="srch_order" value="total"><input type="hidden" name="src_key" value="${query}">';document.body.appendChild(f);f.submit();document.body.removeChild(f);})()` },
                        { name: '노원구', url: `https://eb.nowonlib.kr/elibrary-front/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },

                    ],
                    unjoinedLinks: [
                        { name: '강남구', url: `javascript:(function(){var f=document.createElement('form');f.action='https://ebook.gangnam.go.kr/mobile/mbook/bk_result.asp';f.method='get';f.target='_blank';f.acceptCharset='euc-kr';f.innerHTML='<input type="hidden" name="search" value="title"><input type="hidden" name="strSearch" value="${query}">';document.body.appendChild(f);f.submit();document.body.removeChild(f);})()` },
                        { name: '서초구', url: `https://e-book.seocholib.or.kr/search?keyword=${encodedQuery}` },
                        { name: '동작구', url: `https://ebook.dongjak.go.kr/elibrary-front/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },
                        { name: '서대문구', url: `https://lib.sdm.or.kr/sdmlib/menu/10003/program/30001/searchResultList.do?searchType=SIMPLE&viewType=LIST&searchKeyword=${encodedQuery}&searchPubFormCode=EB&currentPageNo=1&searchDisplay=20&searchArticle=SCORE&searchOrder=ASC` },
                        { name: '송파구 C', url: `javascript:(function(){var f=document.createElement('form');f.action='https://ebook.splib.or.kr/search/';f.method='get';f.target='_blank';f.acceptCharset='euc-kr';f.innerHTML='<input type="hidden" name="srch_order" value="total"><input type="hidden" name="src_key" value="${query}">';document.body.appendChild(f);f.submit();document.body.removeChild(f);})()` },
                        { name: '송파구 S', url: `https://splib.dkyobobook.co.kr/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },
                        { name: '구로구', url: `https://ebook.guro.go.kr/elibrary-front/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },
                        { name: '영등포구', url: `https://ydplib.dkyobobook.co.kr/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },
                        { name: '은평구', url: `https://epbook.eplib.or.kr/ebookPlatform/home/search.do?k=${encodedQuery}` },
                        { name: '종로구', url: `javascript:(function(){var f=document.createElement('form');f.action='https://elib.jongno.go.kr/search/';f.method='get';f.target='_blank';f.acceptCharset='euc-kr';f.innerHTML='<input type="hidden" name="srch_order" value="total"><input type="hidden" name="src_key" value="${query}">';document.body.appendChild(f);f.submit();document.body.removeChild(f);})()` },
                        { name: '중구', url: `https://ebook.junggulib.or.kr/elibrary-front/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },
                        { name: '강서구', url: `javascript:(function(){var f=document.createElement('form');f.action='https://ebook.gangseo.seoul.kr/search/';f.method='get';f.target='_blank';f.acceptCharset='euc-kr';f.innerHTML='<input type="hidden" name="srch_order" value="total"><input type="hidden" name="src_key" value="${query}">';document.body.appendChild(f);f.submit();document.body.removeChild(f);})()` },
                        { name: '강북구', url: `https://ebook.gblib.or.kr/elibrary-front/search/searchList.ink?schClst=all&schDvsn=000&orderByKey=&schTxt=${encodedQuery}` },
                        { name: '강동구 C', url: `https://www.gdlibrary.or.kr/sn/menu/123/book/search/collection?searchType=normal&tabSearch=true&form_code=&media_code=&doc_type=EB_OWN&sortField=score&sortOrder=desc&display=10&searchInput=${encodedQuery}&title=&author=&publisher=&isbn=&keyword=&pub_year_from=&pub_year_to=&manage_code=MH%2CMF%2CMA%2CMB%2CBR%2CMC%2CMD%2CME&smart_manage_code=&small_manage_code=` },
                        { name: '강동구 S', url: `https://www.gdlibrary.or.kr/sn/menu/123/book/search/collection?searchType=normal&tabSearch=true&form_code=&media_code=&doc_type=EB_SUB&sortField=score&sortOrder=desc&display=10&searchInput=${encodedQuery}&title=&author=&publisher=&isbn=&keyword=&pub_year_from=&pub_year_to=&manage_code=MH%2CMF%2CMA%2CMB%2CBR%2CMC%2CMD%2CME&smart_manage_code=&small_manage_code=` },
                        { name: '양천구', url: `https://lib.yangcheon.or.kr/main/site/search/bookSearch.do?detail=ok&cmd_name=bookandnonbooksearch&search_type=detail&use_facet=N&org_detail=&facet_manage_code=&facet_author=&facet_publisher=&facet_pub_year=&facet_subject_code=&facet_media_code=&search_title=${encodedQuery}&search_isbn_issn=&search_author=&media_code=EB&search_publisher=&manage_code=MA%2CMB%2CMC%2CMD%2CME%2CMF%2CMG%2CSG%2CMH%2CSA%2CSB%2CSC%2CSD%2CSF%2CSH%2CSJ%2CSK%2CSM%2CUA%2CUB%2CUD%2CUE%2CFA&search_shelf=&search_shelf=&search_year_start=&search_year_end=&subject_code=&search_keyword=&sh_orderby=&search_bt2=%EA%B2%80%EC%83%89%ED%95%98%EA%B8%B0#detail` },
                        { name: '금천구', url: `https://elib.geumcheonlib.seoul.kr/FxLibrary/m/product/search/?searchstr=${encodedQuery}` },
                        { name: '도봉구', url: `https://www.unilib.dobong.kr/site/search/search08.do?cmd_name=nonbooksearch&search_type=detail&manage_code=MA%2CMB%2CMC%2CME%2CMG%2CMJ%2CMF%2CMH%2CSA%2CMD%2CSB%2CSL%2CSM%2CSN%2CSO%2CSP%2CSK%2CSQ%2CSR%2CSS%2CST%2CSU%2CSG%2CSC&search_item_add=&search_txt_add=&use_facet=Y&org_detail=&facet_manage_code=&facet_author=&facet_publisher=&facet_pub_year=&facet_subject_code=&facet_media_code=EB&search_item=search_title&sh_orderby=&search_txt=${encodedQuery}` }
                    ]
                },
                {
                    id: 'physical',
                    title: '현장 도서관 대여',
                    icon: 'library-big',
                    headerLink: { name: '📍 내 주변 도서관 지도', url: `https://naver.me/xIFJSb28` },
                    links: [
                        { name: '서울 전지역 도서관', url: `https://meta.seoul.go.kr/libseoul/index.php/result?id=177528299650854&category1=0&category2=0&category3=0&text1=${encodedQuery}&text2=&text3=&op=0&op2=0&year1=&year2=&dbnum=44911%2044891%2045011%2043891%2043871%2045351%2088421%2045051%2043861%202201%202191%20103291%20103301%2045111%2043901%2088341%2045221&display=30&recstart=1&sort=rel#/?recstart=1&display=20&dbnum=&key=&type=allResult&reload=on`, icon: 'map' }
                    ]
                },
                {
                    id: 'bookstore',
                    title: '온라인/오프라인 서점',
                    icon: 'shopping-bag',
                    headerLink: { name: '💰 알라딘 중고매입가 조회', url: `https://www.aladin.co.kr/m/c2b/c2b_search.aspx?KeyWord=${encodedQuery}` },
                    links: [
                        { name: '구글 플레이북', url: `https://play.google.com/store/search?q=${encodedQuery}&c=books&hl=ko`, icon: 'play' },
                        { name: '교보문고', url: `https://search.kyobobook.co.kr/search?keyword=${encodedQuery}`, icon: 'book-open' },
                        { name: '알라딘 중고 (온라인)', url: `https://www.aladin.co.kr/m/msearch.aspx?SearchTarget=Used&KeyWord=${encodedQuery}`, icon: 'package' },
                        { name: '알라딘 중고 (오프라인)', url: `https://www.aladin.co.kr/m/msearch.aspx?SearchWord=${encodedQuery}&SearchTarget=UsedStore`, icon: 'store' }
                    ]
                }
            ];

            resultsDiv.innerHTML = '';
            
            categories.forEach(cat => {
                const group = document.createElement('div');
                group.className = 'category-group';
                
                const header = document.createElement('div');
                header.className = 'cat-header';
                
                const title = document.createElement('div');
                title.className = 'cat-title';
                title.innerHTML = `<i data-lucide="${cat.icon}" size="22"></i> ${cat.title}`;
                header.appendChild(title);
                
                if (cat.headerLink) {
                    const hLink = document.createElement('a');
                    hLink.className = 'cat-link';
                    hLink.textContent = cat.headerLink.name;
                    hLink.href = cat.headerLink.url;
                    hLink.target = '_blank';
                    header.appendChild(hLink);
                }

                // 모바일 최적화 그리드 사용
                const grid = document.createElement('div');
                grid.className = 'links-grid';

                cat.links.forEach(lib => {
                    grid.appendChild(createLink(lib, cat.id));
                });
                group.appendChild(header);
                group.appendChild(grid);

                // 자치구 더보기 처리
                if (cat.unjoinedLinks) {
                    const unjoinedGrid = document.createElement('div');
                    unjoinedGrid.className = 'links-grid';
                    unjoinedGrid.style.display = 'none';
                    unjoinedGrid.style.marginTop = '12px';

                    cat.unjoinedLinks.forEach(lib => {
                        unjoinedGrid.appendChild(createLink(lib, cat.id));
                    });
                    group.appendChild(unjoinedGrid);

                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = 'toggle-btn';
                    toggleBtn.innerHTML = '나머지 자치구 모두 보기 <i data-lucide="chevron-down" size="16" style="vertical-align:middle"></i>';
                    toggleBtn.onclick = () => {
                        const isHidden = unjoinedGrid.style.display === 'none';
                        unjoinedGrid.style.display = isHidden ? 'grid' : 'none';
                        toggleBtn.innerHTML = isHidden 
                            ? '숨기기 <i data-lucide="chevron-up" size="16" style="vertical-align:middle"></i>' 
                            : '나머지 자치구 모두 보기 <i data-lucide="chevron-down" size="16" style="vertical-align:middle"></i>';
                        lucide.createIcons();
                    };
                    group.appendChild(toggleBtn);
                }
                resultsDiv.appendChild(group);
            });
            lucide.createIcons(); // 동적으로 생성된 아이콘 렌더링
        }

        // 버튼 생성 로직 (아이콘 추가)
        function createLink(lib, categoryId) {
            const link = document.createElement('a');
            
            // 카테고리별 기본 아이콘 설정 (개별 설정된 아이콘이 없으면 기본값 사용)
            let iconName = lib.icon || 'external-link'; 
            if(!lib.icon && categoryId === 'seoul') iconName = 'map-pin';
            
            link.innerHTML = `<i data-lucide="${iconName}" size="20"></i><span>${lib.name}</span>`;
            
            if (lib.url.startsWith('javascript:')) {
                link.href = "#";
                link.onclick = (e) => { e.preventDefault(); eval(lib.url.substring(11)); };
            } else {
                link.href = lib.url;
                link.target = '_blank';
            }
            return link;
        }

        // -------------- 즐겨찾기 로직 --------------
        function addToWishlist() {
            const input = document.getElementById('search-input');
            const query = input.value.trim();
            if (!query) { 
                alert("검색창에 저장할 책 제목이나 단어를 먼저 입력해주세요!");
                return; 
            }
            input.blur();
            let wishs = JSON.parse(localStorage.getItem('bookWishlist')) || [];
            if (!wishs.includes(query)) {
                wishs.unshift(query);
                localStorage.setItem('bookWishlist', JSON.stringify(wishs));
                loadWishlist();
                
                // 추가 후 패널을 열어줌
                document.getElementById('wishlist-panel').classList.add('show');
            } else {
                alert("이미 즐겨찾기에 있는 단어입니다.");
            }
        }

        function removeFromWishlist(keyword, event) {
            event.stopPropagation(); 
            let wishs = JSON.parse(localStorage.getItem('bookWishlist')) || [];
            wishs = wishs.filter(item => item !== keyword);
            localStorage.setItem('bookWishlist', JSON.stringify(wishs));
            loadWishlist();
        }

        function loadWishlist() {
            const wishs = JSON.parse(localStorage.getItem('bookWishlist')) || [];
            const container = document.getElementById('wishlist');
            container.innerHTML = '';
            
            if(wishs.length === 0) {
                container.innerHTML = '<span style="color:var(--sec-text); font-size:13px;">아직 저장된 즐겨찾기가 없습니다.</span>';
                return;
            }

            wishs.forEach(keyword => {
                const tag = document.createElement('div');
                tag.className = 'tag wish-tag';
                tag.innerHTML = `<span>${keyword}</span><span class="remove-btn" onclick="removeFromWishlist('${keyword}', event)"><i data-lucide="x" size="14"></i></span>`;
                tag.onclick = () => {
                    generateLinks(keyword);
                    document.getElementById('wishlist-panel').classList.remove('show'); // 클릭시 패널 닫기
                };
                container.appendChild(tag);
            });
            lucide.createIcons();
        }

        // -------------- 최근 검색어 로직 --------------
        function saveRecentSearch(query) {
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== query);
            searches.unshift(query);
            if (searches.length > 8) searches.pop();
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            loadRecentSearches();
        }

        function deleteRecentSearch(keyword, event) {
            event.stopPropagation(); // 클릭 이벤트가 부모(검색실행)로 안 넘어가게 막음
            let searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            searches = searches.filter(item => item !== keyword);
            localStorage.setItem('recentBooks', JSON.stringify(searches));
            loadRecentSearches();
            
            // 다 지웠으면 드롭다운 숨기기
            if(searches.length === 0) {
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        }

        function clearRecentSearches(event) {
            event.stopPropagation(); 
            if(confirm("검색 기록을 모두 삭제하시겠습니까?")) {
                localStorage.removeItem('recentBooks'); 
                loadRecentSearches(); 
                document.getElementById('recent-dropdown').style.display = 'none';
            }
        }

        function loadRecentSearches() {
            const searches = JSON.parse(localStorage.getItem('recentBooks')) || [];
            const container = document.getElementById('recent-list');
            container.innerHTML = '';
            
            searches.forEach(keyword => {
                const li = document.createElement('li');
                li.className = 'recent-item';
                
                li.innerHTML = `
                    <div class="recent-text">
                        <i data-lucide="clock" size="14" style="color: var(--sec-text)"></i>
                        ${keyword}
                    </div>
                    <button class="recent-delete" onclick="deleteRecentSearch('${keyword}', event)">
                        <i data-lucide="x" size="16"></i>
                    </button>
                `;
                // 텍스트 부분 클릭시 검색 실행
                li.querySelector('.recent-text').onclick = () => generateLinks(keyword);
                
                container.appendChild(li);
            });
            lucide.createIcons();
        }
    </script>
</body>
