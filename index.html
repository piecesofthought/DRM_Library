<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 및 폴드 기기 화면 비율 맞춤 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 도서 검색 - DRM Library</title>
    
    <!-- Tailwind CSS (디자인을 예쁘고 반응형으로 만들어주는 도구) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 아이콘(Lucide) 불러오기 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 사용자 지정 이화여대 폰트 적용 */
        @font-face {
            font-family: 'EwhaFont';
            src: url('./ewha_font.ttf') format('truetype'); /* 깃허브에 올린 폰트 파일명 */
            font-weight: normal;
            font-style: normal;
        }

        /* 웹사이트 전체에 폰트 적용 및 기본 스타일 */
        body {
            font-family: 'EwhaFont', sans-serif;
            background-color: #f3f4f6; /* 연한 회색 배경 */
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
        }

        /* 로고 이미지 크기 최적화 */
        .site-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        /* 폴드7 특화: 클릭(터치)할 때 반응 효과 */
        .link-button {
            transition: all 0.2s ease;
        }
        .link-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- 메인 컨테이너 (펼쳤을 때 중앙 정렬 및 최대 너비 제한) -->
    <div class="max-w-5xl mx-auto">
        
        <!-- 상단 헤더 및 타이틀 -->
        <header class="flex flex-col items-center justify-center mb-8 pt-4">
            <!-- 메인 홈페이지 아이콘 적용 -->
            <img src="./AllBook_logo.svg" alt="AllBook Logo" class="w-20 h-20 mb-4 drop-shadow-md" onerror="this.style.display='none'">
            <h1 class="text-3xl md:text-4xl font-bold text-center text-indigo-900 mb-2">내 손안의 통합 도서 검색</h1>
            <p class="text-gray-500 text-center text-sm md:text-base">원하는 책을 한 번에 여러 도서관과 서점에서 찾아보세요.</p>
        </header>

        <!-- 검색창 영역 -->
        <div class="bg-white p-4 rounded-2xl shadow-lg mb-8 sticky top-4 z-10">
            <div class="flex gap-2">
                <input type="text" id="searchInput" 
                    class="flex-1 bg-gray-50 text-lg p-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    placeholder="검색할 도서명을 입력하세요..."
                    onkeypress="if(event.key === 'Enter') generateLinks()">
                <button onclick="generateLinks()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 md:px-8 rounded-xl font-bold text-lg shadow-md transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="search"></i>
                    <span class="hidden md:inline">검색</span>
                </button>
            </div>
        </div>

        <!-- 검색 결과(버튼들)가 나타날 영역 -->
        <!-- 폴드7 적용: 접었을땐 1줄(grid-cols-1), 펼쳤을땐 2줄(sm:grid-cols-2), PC/가로모드에선 3줄(lg:grid-cols-3) -->
        <div id="resultsArea" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- 자바스크립트로 이곳에 내용이 채워집니다. -->
        </div>

        <!-- 초기 안내 문구 -->
        <div id="welcomeMessage" class="text-center text-gray-400 mt-20">
            <i data-lucide="book-open" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
            <p class="text-lg">검색어를 입력하시면 사이트 바로가기 버튼이 나타납니다.</p>
        </div>

    </div>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();

        // 사용자가 올려준 텍스트 파일(link_Raw data.txt) 기반의 데이터 구조
        // {query} 부분이 나중에 검색어로 변환됩니다.
        // logo 항목에 올려주신 SVG 파일명을 연결했습니다.
        const categoryData = [
            {
                title: 'E-Book (전자도서관)',
                icon: 'tablet-smartphone',
                color: 'bg-blue-50 border-blue-200',
                links: [
                    { name: '밀리의 서재', url: 'https://www.millie.co.kr/v3/search/result/{query}', logo: '' },
                    { name: '이화여대 전자도서관', url: 'https://lib.ewha.ac.kr/searchA/ebz?st=KWRD&si=TOTAL&q={query}', logo: 'Ewha_logo.svg' },
                    { name: '서울 전자도서관', url: 'https://elib.seoul.go.kr/contents/search/content?t=EB&k={query}', logo: 'SeoulLibrary_logo.svg' },
                    { name: '서울교육청 도서관', url: 'https://e-lib.sen.go.kr/contents/search?type=&searchOpt=0&searchKeyword={query}', logo: 'SeoulEdu_logo.svg' }
                ]
            },
            {
                title: '서울시 자치구 전자도서관',
                icon: 'map-pin',
                color: 'bg-green-50 border-green-200',
                links: [
                    { name: '마포구', url: 'https://ebook.mapo.go.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'mapo_logo.svg' },
                    { name: '용산구', url: 'https://ebook.yslibrary.or.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'yongsan_logo.svg' },
                    { name: '노원구', url: 'https://ebook.nowonlib.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'Nowon_logo.svg' },
                    { name: '관악구', url: 'https://lib.gwanak.go.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'Gwanak_logo.svg' },
                    { name: '동대문구', url: 'https://www.l4d.or.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'dongdaemun_logo.svg' },
                    { name: '성북구', url: 'https://elibrary.sbculture.or.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'Seongbuk_logo.svg' },
                    { name: '중랑구', url: 'https://ebook.jungnanglib.seoul.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'Jungnang_logo.svg' },
                    { name: '강남구', url: 'https://ebook.gangnam.go.kr/elibrary-front/search/searchList.ink?schDvsn=000&orderByKey=&schClst=all&schTxt={query}', logo: 'gangnam_logo.svg' }
                ]
            },
            {
                title: '오프라인 도서관 및 서점',
                icon: 'library',
                color: 'bg-amber-50 border-amber-200',
                links: [
                    { name: '서울 전지역 도서관 통합', url: 'https://meta.seoul.go.kr/libseoul/index.php/result?id=177528299650854&text1={query}&display=30&recstart=1&sort=rel', logo: 'SeoulLibrary_logo.svg' },
                    { name: '알라딘 중고매입가 조회', url: 'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=UsedStore&KeyWord={query}', logo: '' },
                    { name: '교보문고', url: 'https://search.kyobobook.co.kr/search?keyword={query}', logo: '' },
                    { name: 'YES24', url: 'https://www.yes24.com/Product/Search?domain=ALL&query={query}', logo: '' }
                ]
            }
        ];

        // 검색 버튼을 눌렀을 때 실행되는 함수
        function generateLinks() {
            const searchInput = document.getElementById('searchInput').value.trim();
            const resultsArea = document.getElementById('resultsArea');
            const welcomeMessage = document.getElementById('welcomeMessage');

            // 검색어가 없으면 경고창 띄우기
            if (!searchInput) {
                alert('검색할 도서명을 입력해주세요.');
                return;
            }

            // 한글 인코딩 처리 (구형 자바스크립트 대신 웹 표준 방식 사용 -> 깨짐 방지)
            const encodedQuery = encodeURIComponent(searchInput);

            // 초기 안내 문구 숨기고 결과 영역 보이기
            welcomeMessage.classList.add('hidden');
            resultsArea.classList.remove('hidden');

            // 결과 영역 초기화
            resultsArea.innerHTML = '';

            // 카테고리별로 카드(박스) 만들기
            categoryData.forEach(category => {
                // 카드 HTML 뼈대 생성
                let cardHTML = `
                    <div class="${category.color} border rounded-2xl p-5 shadow-sm flex flex-col h-full">
                        <div class="flex items-center gap-2 mb-4 pb-2 border-b border-gray-200/50">
                            <i data-lucide="${category.icon}" class="text-gray-700"></i>
                            <h2 class="text-xl font-bold text-gray-800">${category.title}</h2>
                        </div>
                        <div class="flex flex-col gap-3 flex-grow">
                `;

                // 카테고리 안의 각각의 링크 버튼 생성
                category.links.forEach(link => {
                    // {query} 부분을 인코딩된 진짜 검색어로 교체
                    const finalUrl = link.url.replace('{query}', encodedQuery);
                    
                    // 로고 이미지가 있으면 <img> 태그 넣기, 없으면 책 아이콘 넣기
                    const iconHTML = link.logo 
                        ? `<img src="./${link.logo}" class="site-logo" onerror="this.style.display='none'">` 
                        : `<i data-lucide="book" class="w-5 h-5 text-gray-500"></i>`;

                    // 버튼 HTML 추가 (target="_blank"로 새창 열림 설정)
                    cardHTML += `
                        <a href="${finalUrl}" target="_blank" rel="noopener noreferrer" 
                           class="link-button flex items-center gap-3 bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:shadow-md hover:border-indigo-300 text-gray-700 font-medium decoration-transparent">
                            ${iconHTML}
                            <span class="truncate">${link.name}</span>
                            <i data-lucide="external-link" class="w-4 h-4 ml-auto text-gray-400"></i>
                        </a>
                    `;
                });

                cardHTML += `
                        </div>
                    </div>
                `;

                // 완성된 카드를 결과 영역에 추가
                resultsArea.insertAdjacentHTML('beforeend', cardHTML);
            });

            // 동적으로 추가된 아이콘들 다시 렌더링
            lucide.createIcons();
        }
    </script>
</body>
</html>
